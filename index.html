<!DOCTYPE html>
<html lang="it">
<head>

    <title>Finestra sul Mare</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Tanti Nomi, Un Solo Mare</h1>
    </header>

    <main class="container">
        <div class="wall">            
            <div class="window-frame">
                <!-- Video di sfondo -->
                <video class="ocean-video" autoplay loop muted playsinline>
                    <source src="assets/ocean-waves.mp4" type="video/mp4">
                    Il tuo browser non supporta il video.
                </video>

                <!-- Cornice finestra con ante -->
                <div class="window-overlay"></div>

                <!-- Audio onde del mare -->
                <audio id="ocean-audio" loop>
                    <source src="assets/ocean-waves.mp3" type="audio/mpeg">
                    Il tuo browser non supporta l'audio.
                </audio>


            </div>
        </div> 
               <!-- Frecce di navigazione -->
                <a href="pagina1.html" class="nav-arrow nav-arrow-left" aria-label="Pagina precedente">

                    </svg>
                </a>
                <a href="pagina2.html" class="nav-arrow nav-arrow-right" aria-label="Pagina successiva">

    </main>

    <script src="script.js"></script>
